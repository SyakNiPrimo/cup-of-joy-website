<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Staff Login — Cup of Joy</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FADA2A;
    --brown: #3D2000;
    --cream: #FFFDF0;
    --brown-light: #6b3a00;
    --red: #C0392B;
    --green: #2E7D32;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--brown);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
  }

  .brand {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .brand .logo-text {
    font-weight: 900;
    font-size: 1.9rem;
    letter-spacing: -0.01em;
    color: var(--brown);
  }

  .brand .logo-text span {
    color: var(--yellow);
    -webkit-text-stroke: 1.5px var(--brown);
  }

  .brand .tagline {
    font-weight: 700;
    font-size: .8rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    opacity: .55;
    margin-top: .25rem;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(61,32,0,.14);
    overflow: hidden;
  }

  /* Tabs: Staff / Owner */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--brown);
  }

  .tab-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .82rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    background: transparent;
    border: none;
    padding: 1rem .5rem;
    cursor: pointer;
    transition: color .2s, background .2s;
  }

  .tab-btn.active {
    color: var(--brown);
    background: var(--yellow);
  }

  .panel {
    display: none;
    padding: 1.75rem 1.5rem 2rem;
  }

  .panel.active { display: block; }

  /* Staff sub-mode toggle */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: .5rem;
    margin-bottom: 1.25rem;
  }

  .mode-link {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    color: var(--brown-light);
    background: none;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: .25rem;
  }

  .mode-view { display: none; }
  .mode-view.active { display: block; }

  #qr-reader {
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    min-height: 260px;
  }

  .qr-hint {
    text-align: center;
    font-size: .85rem;
    font-weight: 600;
    opacity: .65;
    margin-top: .85rem;
  }

  label {
    display: block;
    font-weight: 700;
    font-size: .82rem;
    margin-bottom: .4rem;
    color: var(--brown-light);
  }

  .field { margin-bottom: 1.1rem; }

  select, input[type="password"], input[type="text"], input[type="tel"] {
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: .8rem .95rem;
    border-radius: 12px;
    border: 2px solid #eee3c8;
    background: var(--cream);
    color: var(--brown);
    outline: none;
    transition: border-color .2s;
  }

  select:focus, input:focus { border-color: var(--yellow); }

  input[type="password"] {
    letter-spacing: .5em;
    text-align: center;
    font-size: 1.3rem;
  }

  .btn {
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: .9rem;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--brown);
    background: var(--yellow);
    border: none;
    border-radius: 12px;
    padding: .9rem;
    cursor: pointer;
    transition: transform .12s, opacity .2s;
  }

  .btn:hover { transform: translateY(-1px); opacity: .92; }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .btn-dark {
    background: var(--brown);
    color: var(--yellow);
  }

  .error-msg {
    display: none;
    background: #fdecea;
    color: var(--red);
    border: 1px solid #f5c6c1;
    font-weight: 700;
    font-size: .85rem;
    border-radius: 10px;
    padding: .7rem .9rem;
    margin-top: 1rem;
    text-align: center;
  }

  .error-msg.show { display: block; }

  /* Location overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(61,32,0,.88);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.1rem;
    z-index: 500;
    color: var(--cream);
    text-align: center;
    padding: 1.5rem;
  }

  .overlay.show { display: flex; }

  .spinner {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 4px solid rgba(255,253,240,.25);
    border-top-color: var(--yellow);
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay p {
    font-weight: 700;
    font-size: .95rem;
    max-width: 280px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="logo-text">Cup of <span>Joy</span></div>
    <div class="tagline">Staff Portal</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabStaffBtn" type="button">Staff</button>
      <button class="tab-btn" id="tabOwnerBtn" type="button">Owner</button>
    </div>

    <!-- STAFF PANEL -->
    <div class="panel active" id="panelStaff">
      <div class="mode-toggle">
        <button class="mode-link" id="showQrBtn" type="button">Scan QR</button>
        <span style="opacity:.4">|</span>
        <button class="mode-link" id="showPinBtn" type="button">Use PIN</button>
      </div>

      <div class="mode-view active" id="viewQr">
        <div id="qr-reader"></div>
        <div class="qr-hint">Point your camera at your staff QR code</div>
      </div>

      <div class="mode-view" id="viewPin">
        <div class="field">
          <label for="pinStaffSelect">Your Name</label>
          <select id="pinStaffSelect">
            <option value="">Select your name…</option>
          </select>
        </div>
        <div class="field">
          <label for="pinInput">4-Digit PIN</label>
          <input type="password" id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off" />
        </div>
        <button class="btn" id="pinSubmitBtn" type="button">Log In</button>
      </div>

      <div class="error-msg" id="staffError"></div>
    </div>

    <!-- OWNER PANEL -->
    <div class="panel" id="panelOwner">
      <div class="field">
        <label for="ownerPassword">Owner Password</label>
        <input type="password" id="ownerPassword" autocomplete="off" placeholder="Enter password" />
      </div>
      <button class="btn btn-dark" id="ownerSubmitBtn" type="button">Log In as Owner</button>
      <div class="error-msg" id="ownerError"></div>
    </div>
  </div>
</div>

<div class="overlay" id="locationOverlay">
  <div class="spinner"></div>
  <p id="overlayText">Checking your location…</p>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@insforge/sdk@latest';

const insforge = createClient({
  baseUrl: 'https://pvpiya9j.us-east.insforge.app',
  anonKey: 'anon_e730824779c5d7b0e80185ec5b848574506f206fe52184ad17ff69d633586a1b'
});

let SHOP_LAT = 16.230069995562978;
let SHOP_LNG = 120.48822516474148;
let RADIUS_M = 50;
const OWNER_PASSWORD = 'CupOfJoy@2025';

/* Pull owner-configurable shop location/radius from settings (Phase 4), falling
   back to the defaults above if settings haven't been set yet or fail to load. */
(async () => {
  try {
    const { data } = await insforge.database.from('settings').select('key,value')
      .in('key', ['shop_lat', 'shop_lng', 'radius_meters']);
    (data || []).forEach(row => {
      if (row.key === 'shop_lat' && row.value) SHOP_LAT = parseFloat(row.value);
      if (row.key === 'shop_lng' && row.value) SHOP_LNG = parseFloat(row.value);
      if (row.key === 'radius_meters' && row.value) RADIUS_M = parseFloat(row.value);
    });
  } catch (e) { console.error('Failed to load location settings, using defaults', e); }
})();

/* ── Already logged in? Skip straight to dashboard ── */
const existing = getSession();
if (existing?.role === 'owner') window.location.href = 'owner-dashboard.html';
else if (existing?.role === 'staff') window.location.href = 'staff-dashboard.html';

const SESSION_MAX_INACTIVITY_MS = 12 * 60 * 60 * 1000; // 12 hours
function getSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem('cupofjoy_session'));
    if (!s) return null;
    if (Date.now() - (s.lastActivityAt || s.loginAt) > SESSION_MAX_INACTIVITY_MS) {
      sessionStorage.removeItem('cupofjoy_session');
      return null;
    }
    s.lastActivityAt = Date.now();
    sessionStorage.setItem('cupofjoy_session', JSON.stringify(s));
    return s;
  } catch { return null; }
}

function setSession(obj) {
  sessionStorage.setItem('cupofjoy_session', JSON.stringify(obj));
}

/* ── Tabs ── */
const tabStaffBtn = document.getElementById('tabStaffBtn');
const tabOwnerBtn = document.getElementById('tabOwnerBtn');
const panelStaff = document.getElementById('panelStaff');
const panelOwner = document.getElementById('panelOwner');

tabStaffBtn.addEventListener('click', () => {
  tabStaffBtn.classList.add('active');
  tabOwnerBtn.classList.remove('active');
  panelStaff.classList.add('active');
  panelOwner.classList.remove('active');
  startScanner();
});

tabOwnerBtn.addEventListener('click', () => {
  tabOwnerBtn.classList.add('active');
  tabStaffBtn.classList.remove('active');
  panelOwner.classList.add('active');
  panelStaff.classList.remove('active');
  stopScanner();
});

/* ── Staff QR / PIN mode toggle ── */
const showQrBtn = document.getElementById('showQrBtn');
const showPinBtn = document.getElementById('showPinBtn');
const viewQr = document.getElementById('viewQr');
const viewPin = document.getElementById('viewPin');

showQrBtn.addEventListener('click', () => {
  viewQr.classList.add('active');
  viewPin.classList.remove('active');
  hideError('staffError');
  startScanner();
});

showPinBtn.addEventListener('click', () => {
  viewPin.classList.add('active');
  viewQr.classList.remove('active');
  hideError('staffError');
  stopScanner();
});

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

function hideError(id) {
  document.getElementById(id).classList.remove('show');
}

/* ── Overlay ── */
const overlay = document.getElementById('locationOverlay');
const overlayText = document.getElementById('overlayText');

function showOverlay(text) {
  overlayText.textContent = text || 'Checking your location…';
  overlay.classList.add('show');
}

function hideOverlay() {
  overlay.classList.remove('show');
}

/* ── Distance calc ── */
function distanceMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

/* ── Log attempt ── */
async function logAttempt({ staff_id = null, staff_name = null, latitude = null, longitude = null, distance_from_shop = null, method, success, notes = null }) {
  try {
    await insforge.database.from('login_logs').insert([{
      staff_id, staff_name, latitude, longitude, distance_from_shop, method, success, notes
    }]);
  } catch (e) {
    console.error('Failed to log attempt', e);
  }
}

/* ── Location check + final login ── */
function verifyLocationAndLogin(staffRecord, method) {
  showOverlay('Checking your location…');

  if (!navigator.geolocation) {
    hideOverlay();
    showError('staffError', 'Location access is required. Please enable it in your browser settings and try again');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude, longitude } = pos.coords;
      const distance = distanceMeters(latitude, longitude, SHOP_LAT, SHOP_LNG);

      if (distance <= RADIUS_M) {
        await logAttempt({
          staff_id: staffRecord.id, staff_name: staffRecord.name,
          latitude, longitude, distance_from_shop: distance,
          method, success: true
        });
        setSession({
          role: 'staff',
          staffId: staffRecord.id,
          staffName: staffRecord.name,
          staffRole: staffRecord.role,
          loginAt: Date.now()
        });
        window.location.href = 'staff-dashboard.html';
      } else {
        await logAttempt({
          staff_id: staffRecord.id, staff_name: staffRecord.name,
          latitude, longitude, distance_from_shop: distance,
          method, success: false, notes: 'Outside allowed radius'
        });
        hideOverlay();
        showError('staffError', 'You must be at the shop to log in');
        resumeScannerIfNeeded();
      }
    },
    async (err) => {
      await logAttempt({
        staff_id: staffRecord.id, staff_name: staffRecord.name,
        method, success: false,
        notes: err.code === 1 ? 'Location permission denied' : `Location error: ${err.message}`
      });
      hideOverlay();
      showError('staffError', 'Location access is required. Please enable it in your browser settings and try again');
      resumeScannerIfNeeded();
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function resumeScannerIfNeeded() {
  if (viewQr.classList.contains('active') && scannerRunning) {
    setTimeout(() => { try { html5QrCode.resume(); } catch {} }, 400);
  }
}

/* ── QR Scanner ── */
let html5QrCode;
let scannerRunning = false;
let scanLock = false;

async function startScanner() {
  if (scannerRunning) return;
  html5QrCode = html5QrCode || new Html5Qrcode('qr-reader');
  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      {
        fps: 10,
        // A fixed qrbox can exceed the actual camera feed size on some phones
        // (especially portrait mode), which silently breaks detection instead
        // of erroring. Size it relative to the real viewfinder instead.
        qrbox: (viewfinderWidth, viewfinderHeight) => {
          const size = Math.floor(Math.min(viewfinderWidth, viewfinderHeight) * 0.7);
          return { width: size, height: size };
        }
      },
      onScanSuccess,
      () => {}
    );
    scannerRunning = true;
  } catch (e) {
    console.error('QR scanner failed to start', e);
    showError('staffError', 'Camera unavailable. Please use PIN login instead.');
  }
}

function stopScanner() {
  if (scannerRunning && html5QrCode) {
    html5QrCode.stop().then(() => html5QrCode.clear()).catch(() => {});
    scannerRunning = false;
  }
}

async function onScanSuccess(decodedText) {
  if (scanLock) return;
  scanLock = true;
  try { html5QrCode.pause(true); } catch {}
  hideError('staffError');

  try {
    const { data } = await insforge.database
      .from('staff')
      .select('id,name,role,status')
      .eq('token', decodedText.trim())
      .maybeSingle();

    if (!data) {
      await logAttempt({ method: 'qr', success: false, notes: 'Invalid QR code' });
      showError('staffError', 'Invalid QR code');
      scanLock = false;
      resumeScannerIfNeeded();
      return;
    }

    if (data.status === 'disabled') {
      await logAttempt({ staff_id: data.id, staff_name: data.name, method: 'qr', success: false, notes: 'Account disabled' });
      showError('staffError', 'This account has been disabled. Please contact the owner');
      scanLock = false;
      resumeScannerIfNeeded();
      return;
    }

    verifyLocationAndLogin(data, 'qr');
    scanLock = false;
  } catch (e) {
    // Surface unexpected failures (e.g. a dropped network request) instead of
    // leaving the camera silently paused with no feedback.
    console.error('QR scan handling failed', e);
    showError('staffError', 'Something went wrong reading that code. Please try again.');
    scanLock = false;
    resumeScannerIfNeeded();
  }
}

/* ── PIN login ── */
async function loadStaffDropdown() {
  const select = document.getElementById('pinStaffSelect');
  const { data, error } = await insforge.database
    .from('staff')
    .select('id,name')
    .eq('status', 'active')
    .order('name', { ascending: true });

  if (error || !data) return;
  data.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    select.appendChild(opt);
  });
}
loadStaffDropdown();

document.getElementById('pinSubmitBtn').addEventListener('click', async () => {
  hideError('staffError');
  const staffId = document.getElementById('pinStaffSelect').value;
  const pin = document.getElementById('pinInput').value.trim();

  if (!staffId) { showError('staffError', 'Please select your name'); return; }
  if (!/^[0-9]{4}$/.test(pin)) { showError('staffError', 'Enter your 4-digit PIN'); return; }

  const btn = document.getElementById('pinSubmitBtn');
  btn.disabled = true;

  const { data } = await insforge.database
    .from('staff')
    .select('id,name,role,status,pin')
    .eq('id', staffId)
    .maybeSingle();

  if (!data) {
    showError('staffError', 'Staff record not found');
    btn.disabled = false;
    return;
  }

  if (data.status === 'disabled') {
    await logAttempt({ staff_id: data.id, staff_name: data.name, method: 'pin', success: false, notes: 'Account disabled' });
    showError('staffError', 'This account has been disabled. Please contact the owner');
    btn.disabled = false;
    return;
  }

  if (data.pin !== pin) {
    await logAttempt({ staff_id: data.id, staff_name: data.name, method: 'pin', success: false, notes: 'Incorrect PIN' });
    showError('staffError', 'Incorrect PIN. Try again');
    btn.disabled = false;
    return;
  }

  verifyLocationAndLogin(data, 'pin');
  btn.disabled = false;
});

/* ── Owner login ── */
document.getElementById('ownerSubmitBtn').addEventListener('click', () => {
  hideError('ownerError');
  const pw = document.getElementById('ownerPassword').value;

  if (pw !== OWNER_PASSWORD) {
    showError('ownerError', 'Incorrect password');
    return;
  }

  setSession({ role: 'owner', loginAt: Date.now() });
  window.location.href = 'owner-dashboard.html';
});

document.getElementById('ownerPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('ownerSubmitBtn').click();
});
document.getElementById('pinInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('pinSubmitBtn').click();
});

/* ── Start on load ── */
startScanner();
</script>
</body>
</html>
