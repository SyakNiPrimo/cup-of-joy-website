<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Manual Time Entry — Cup of Joy</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --yellow: #FADA2A; --brown: #3D2000; --cream: #FFFDF0; --brown-light: #6b3a00;
    --red: #C0392B; --green: #2E7D32; --grey: #9a8f78;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; padding-bottom: 2rem; }
  button, select, input { font-family: 'Nunito', sans-serif; }

  header.topbar {
    background: var(--brown); color: var(--cream); padding: .9rem 1.1rem;
    display: flex; align-items: center; justify-content: space-between; gap: .6rem; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 60;
  }
  header.topbar .logo-text { font-weight: 900; font-size: 1.2rem; }
  header.topbar .logo-text span { color: var(--yellow); }
  header.topbar .sub { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; opacity: .65; }
  header.topbar .right { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .topbar-btn {
    font-weight: 800; font-size: .74rem; letter-spacing: .05em; text-transform: uppercase;
    background: rgba(255,253,240,.12); color: var(--cream); border: 1px solid rgba(255,253,240,.35);
    border-radius: 8px; padding: .5rem .85rem; cursor: pointer; text-decoration: none; display: inline-block;
  }
  .topbar-btn.logout { background: var(--red); border-color: var(--red); }

  main { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1.1rem; }

  .card { background: #fff; border-radius: 16px; padding: 1.25rem; box-shadow: 0 6px 20px rgba(61,32,0,.07); margin-bottom: 1.5rem; }
  .card h2 { font-size: 1.05rem; margin-bottom: 1rem; }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .9rem; align-items: end; }
  label { display: block; font-weight: 700; font-size: .76rem; margin-bottom: .35rem; color: var(--brown-light); }
  input, select {
    width: 100%; padding: .65rem .8rem; border-radius: 10px; border: 2px solid #eee3c8;
    background: var(--cream); color: var(--brown); font-weight: 700; font-size: .88rem; outline: none;
  }
  input:focus, select:focus { border-color: var(--yellow); }
  .btn {
    font-weight: 800; font-size: .82rem; letter-spacing: .04em; text-transform: uppercase;
    color: var(--brown); background: var(--yellow); border: none; border-radius: 10px; padding: .75rem 1.1rem; cursor: pointer;
  }
  .btn-dark { background: var(--brown); color: var(--yellow); }
  .btn-outline { background: transparent; color: var(--brown); border: 2px solid var(--brown); }
  .btn-red { background: var(--red); color: #fff; }
  .btn-sm { padding: .45rem .75rem; font-size: .7rem; }

  .msg { display: none; font-weight: 700; font-size: .82rem; border-radius: 10px; padding: .65rem .85rem; margin-top: .8rem; }
  .msg.show { display: block; }
  .msg.error { background: #fdecea; color: var(--red); border: 1px solid #f5c6c1; }
  .msg.success { background: #e8f5e9; color: var(--green); border: 1px solid #c5e6c8; }

  .filter-row { display: flex; gap: .7rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: end; }
  .filter-row .field { flex: 1 1 150px; }

  table { width: 100%; border-collapse: collapse; font-size: .83rem; }
  th, td { text-align: left; padding: .65rem .5rem; border-bottom: 1px solid #f0e8d0; white-space: nowrap; }
  th { font-weight: 800; text-transform: uppercase; font-size: .68rem; opacity: .6; }
  .table-scroll { overflow-x: auto; }

  .tag { font-size: .65rem; font-weight: 800; text-transform: uppercase; padding: .18rem .55rem; border-radius: 50px; }
  .tag.auto { background: #e8f5e9; color: var(--green); }
  .tag.manual { background: #fff3cd; color: #8a6d00; }

  .empty-state { text-align: center; font-weight: 700; opacity: .5; padding: 1.5rem 0; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(61,32,0,.6); display: none;
    align-items: center; justify-content: center; z-index: 300; padding: 1.25rem;
  }
  .modal-backdrop.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; max-width: 420px; width: 100%; padding: 1.5rem; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 1.05rem; margin-bottom: 1rem; }
  .modal p { font-weight: 600; opacity: .8; margin-bottom: 1rem; }
  .btn-row { display: flex; gap: .6rem; margin-top: 1rem; }
  .btn-row .btn { flex: 1; }
</style>
</head>
<body>

<header class="topbar">
  <div>
    <div class="logo-text">Cup of <span>Joy</span></div>
    <div class="sub">Manual Time Entry</div>
  </div>
  <div class="right">
    <a class="topbar-btn" href="owner-dashboard.html">← Dashboard</a>
    <button class="topbar-btn logout" id="logoutBtn" type="button">Log Out</button>
  </div>
</header>

<main>
  <div class="card">
    <h2>Add Manual Shift Entry</h2>
    <div class="form-grid">
      <div>
        <label for="addStaff">Staff Member</label>
        <select id="addStaff"></select>
      </div>
      <div>
        <label for="addDate">Date</label>
        <input type="date" id="addDate" />
      </div>
      <div>
        <label for="addClockIn">Clock In</label>
        <input type="time" id="addClockIn" />
      </div>
      <div>
        <label for="addClockOut">Clock Out (optional)</label>
        <input type="time" id="addClockOut" />
      </div>
      <div>
        <label for="addNote">Note (optional)</label>
        <input type="text" id="addNote" placeholder="e.g. forgot to clock in" />
      </div>
      <button class="btn btn-dark" id="addEntryBtn" type="button">Save Entry</button>
    </div>
    <div class="msg" id="addMsg"></div>
  </div>

  <div class="card">
    <h2>All Shift Entries</h2>
    <div class="filter-row">
      <div class="field">
        <label for="filterStaff">Staff</label>
        <select id="filterStaff"><option value="">All Staff</option></select>
      </div>
      <div class="field">
        <label for="filterStart">From</label>
        <input type="date" id="filterStart" />
      </div>
      <div class="field">
        <label for="filterEnd">To</label>
        <input type="date" id="filterEnd" />
      </div>
      <button class="btn btn-outline btn-sm" id="applyFilterBtn" type="button">Filter</button>
      <button class="btn btn-outline btn-sm" id="clearFilterBtn" type="button">Clear</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>Staff</th><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Duration</th><th>Method</th><th>Notes</th><th>Actions</th></tr></thead>
        <tbody id="entriesBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <h3>Edit Shift Entry</h3>
    <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
      <div>
        <label for="editDate">Date</label>
        <input type="date" id="editDate" />
      </div>
      <div></div>
      <div>
        <label for="editClockIn">Clock In</label>
        <input type="time" id="editClockIn" />
      </div>
      <div>
        <label for="editClockOut">Clock Out</label>
        <input type="time" id="editClockOut" />
      </div>
    </div>
    <div style="margin-top:.9rem;">
      <label for="editNote">Note</label>
      <input type="text" id="editNote" />
    </div>
    <div class="msg" id="editMsg"></div>
    <div class="btn-row">
      <button class="btn btn-outline" id="editCancelBtn" type="button">Cancel</button>
      <button class="btn btn-dark" id="editSaveBtn" type="button">Save Changes</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-backdrop" id="deleteModal">
  <div class="modal">
    <h3>Delete Shift Entry?</h3>
    <p>This will permanently remove this clock-in/out record. This cannot be undone.</p>
    <div class="btn-row">
      <button class="btn btn-outline" id="deleteCancelBtn" type="button">Cancel</button>
      <button class="btn btn-red" id="deleteConfirmBtn" type="button">Delete</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@insforge/sdk@latest';

const insforge = createClient({
  baseUrl: 'https://pvpiya9j.us-east.insforge.app',
  anonKey: 'anon_e730824779c5d7b0e80185ec5b848574506f206fe52184ad17ff69d633586a1b'
});

/* ══════════════════ SESSION GUARD (owner only) ══════════════════ */
const SESSION_MAX_INACTIVITY_MS = 12 * 60 * 60 * 1000; // 12 hours
function getSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem('cupofjoy_session'));
    if (!s) return null;
    if (Date.now() - (s.lastActivityAt || s.loginAt) > SESSION_MAX_INACTIVITY_MS) {
      sessionStorage.removeItem('cupofjoy_session');
      return null;
    }
    s.lastActivityAt = Date.now();
    sessionStorage.setItem('cupofjoy_session', JSON.stringify(s));
    return s;
  } catch { return null; }
}
const session = getSession();
if (!session) window.location.href = 'login.html';
else if (session.role !== 'owner') window.location.href = 'staff-dashboard.html';

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('cupofjoy_session');
  window.location.href = 'login.html';
});

/* ══════════════════ HELPERS ══════════════════ */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str ?? '';
  return div.innerHTML;
}
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function fmtTime(iso) {
  return iso ? new Date(iso).toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' }) : '—';
}
function fmtDurationMin(mins) {
  if (mins == null) return '—';
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}h ${m}m`;
}
function combineDateTime(dateStr, timeStr) {
  if (!dateStr || !timeStr) return null;
  return new Date(`${dateStr}T${timeStr}:00`).toISOString();
}
function toLocalTimeInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

/* ══════════════════ LOAD STAFF DROPDOWNS ══════════════════ */
async function loadStaffOptions() {
  const { data } = await insforge.database.from('staff').select('id,name,status').order('name', { ascending: true });
  const addSel = document.getElementById('addStaff');
  const filterSel = document.getElementById('filterStaff');
  (data || []).filter(s => s.status === 'active').forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    addSel.appendChild(opt);
  });
  (data || []).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    filterSel.appendChild(opt);
  });
}

/* ══════════════════ ADD ENTRY ══════════════════ */
document.getElementById('addEntryBtn').addEventListener('click', async () => {
  const msg = document.getElementById('addMsg');
  msg.className = 'msg';

  const staffId = document.getElementById('addStaff').value;
  const staffName = document.getElementById('addStaff').selectedOptions[0]?.textContent;
  const date = document.getElementById('addDate').value;
  const clockInTime = document.getElementById('addClockIn').value;
  const clockOutTime = document.getElementById('addClockOut').value;
  const note = document.getElementById('addNote').value.trim();

  if (!staffId) { msg.textContent = 'Please select a staff member'; msg.className = 'msg show error'; return; }
  if (!date) { msg.textContent = 'Please select a date'; msg.className = 'msg show error'; return; }
  if (!clockInTime) { msg.textContent = 'Please enter a clock in time'; msg.className = 'msg show error'; return; }

  const clockIn = combineDateTime(date, clockInTime);
  const clockOut = clockOutTime ? combineDateTime(date, clockOutTime) : null;
  const duration = clockOut ? Math.round((new Date(clockOut) - new Date(clockIn)) / 60000) : null;

  const { error } = await insforge.database.from('shift_logs').insert([{
    staff_id: staffId, staff_name: staffName, date,
    clock_in_time: clockIn, clock_out_time: clockOut,
    duration_minutes: duration, method: 'manual', notes: note || null
  }]);

  if (error) { msg.textContent = 'Failed to save entry'; msg.className = 'msg show error'; console.error(error); return; }

  msg.textContent = 'Entry saved successfully';
  msg.className = 'msg show success';
  document.getElementById('addDate').value = '';
  document.getElementById('addClockIn').value = '';
  document.getElementById('addClockOut').value = '';
  document.getElementById('addNote').value = '';
  loadEntries();
});

/* ══════════════════ LOAD / FILTER ENTRIES ══════════════════ */
async function loadEntries() {
  const tbody = document.getElementById('entriesBody');
  tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Loading…</td></tr>';

  let query = insforge.database.from('shift_logs').select('*').order('clock_in_time', { ascending: false }).limit(300);

  const staffId = document.getElementById('filterStaff').value;
  const start = document.getElementById('filterStart').value;
  const end = document.getElementById('filterEnd').value;
  if (staffId) query = query.eq('staff_id', staffId);
  if (start) query = query.gte('date', start);
  if (end) query = query.lte('date', end);

  const { data } = await query;

  tbody.innerHTML = '';
  if (!data || data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No shift entries found.</td></tr>';
    return;
  }

  data.forEach(row => {
    const dur = row.duration_minutes != null ? row.duration_minutes
      : (row.clock_out_time ? (new Date(row.clock_out_time) - new Date(row.clock_in_time)) / 60000 : null);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(row.staff_name)}</td>
      <td>${row.date}</td>
      <td>${fmtTime(row.clock_in_time)}</td>
      <td>${row.clock_out_time ? fmtTime(row.clock_out_time) : '<em>Ongoing</em>'}</td>
      <td>${fmtDurationMin(dur)}</td>
      <td><span class="tag ${row.method}">${row.method === 'manual' ? 'Manual' : 'Auto'}</span></td>
      <td>${escapeHtml(row.notes || '—')}</td>
      <td>
        <button class="btn btn-outline btn-sm" data-action="edit">Edit</button>
        <button class="btn btn-red btn-sm" data-action="delete">Delete</button>
      </td>`;
    tr.querySelector('[data-action="edit"]').addEventListener('click', () => openEditModal(row));
    tr.querySelector('[data-action="delete"]').addEventListener('click', () => openDeleteModal(row.id));
    tbody.appendChild(tr);
  });
}

document.getElementById('applyFilterBtn').addEventListener('click', loadEntries);
document.getElementById('clearFilterBtn').addEventListener('click', () => {
  document.getElementById('filterStaff').value = '';
  document.getElementById('filterStart').value = '';
  document.getElementById('filterEnd').value = '';
  loadEntries();
});

/* ══════════════════ EDIT ══════════════════ */
const editModal = document.getElementById('editModal');
let editTarget = null;

function openEditModal(row) {
  editTarget = row;
  document.getElementById('editMsg').className = 'msg';
  document.getElementById('editDate').value = row.date;
  document.getElementById('editClockIn').value = toLocalTimeInput(row.clock_in_time);
  document.getElementById('editClockOut').value = toLocalTimeInput(row.clock_out_time);
  document.getElementById('editNote').value = row.notes || '';
  editModal.classList.add('show');
}
document.getElementById('editCancelBtn').addEventListener('click', () => editModal.classList.remove('show'));

document.getElementById('editSaveBtn').addEventListener('click', async () => {
  if (!editTarget) return;
  const msg = document.getElementById('editMsg');
  msg.className = 'msg';

  const date = document.getElementById('editDate').value;
  const clockInTime = document.getElementById('editClockIn').value;
  const clockOutTime = document.getElementById('editClockOut').value;
  const note = document.getElementById('editNote').value.trim();

  if (!date || !clockInTime) { msg.textContent = 'Date and clock in time are required'; msg.className = 'msg show error'; return; }

  const clockIn = combineDateTime(date, clockInTime);
  const clockOut = clockOutTime ? combineDateTime(date, clockOutTime) : null;
  const duration = clockOut ? Math.round((new Date(clockOut) - new Date(clockIn)) / 60000) : null;

  const { error } = await insforge.database.from('shift_logs').update({
    date, clock_in_time: clockIn, clock_out_time: clockOut, duration_minutes: duration,
    notes: note || null, method: 'manual', edited_by: 'Owner', edited_at: new Date().toISOString()
  }).eq('id', editTarget.id);

  if (error) { msg.textContent = 'Failed to save changes'; msg.className = 'msg show error'; return; }

  editModal.classList.remove('show');
  loadEntries();
});

/* ══════════════════ DELETE ══════════════════ */
const deleteModal = document.getElementById('deleteModal');
let deleteTargetId = null;
function openDeleteModal(id) {
  deleteTargetId = id;
  deleteModal.classList.add('show');
}
document.getElementById('deleteCancelBtn').addEventListener('click', () => deleteModal.classList.remove('show'));
document.getElementById('deleteConfirmBtn').addEventListener('click', async () => {
  if (!deleteTargetId) return;
  await insforge.database.from('shift_logs').delete().eq('id', deleteTargetId);
  deleteModal.classList.remove('show');
  loadEntries();
});

/* ══════════════════ INIT ══════════════════ */
(async () => {
  await loadStaffOptions();
  await loadEntries();
})();
</script>
</body>
</html>
